<h4>Student Service</h4>

<div class="search-container">
  <mat-form-field>
    <mat-label>Search by last name</mat-label>
    <input matInput [(ngModel)]="lastNameQuery" />
  </mat-form-field>
  <button class="search-button" mat-raised-button color="primary" (click)="onSearch()">Search</button>
</div>

<mat-spinner *ngIf="isLoading()" diameter="40"></mat-spinner>

<ul *ngIf="!isLoading() && students().length > 0">
  <li *ngFor="let student of students()">
    <app-student-details [student]="student" />
  </li>
</ul>

<p *ngIf="!isLoading() && students().length === 0 && lastNameQuery">
  No results found.
</p>
